<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }
    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      resize: none;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      padding: 12px;
      background-color: #0d99ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled {
      background-color: #b3d7ff;
      cursor: not-allowed;
    }
    .status {
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.error {
      background-color: #fff1f0;
      color: #cf1322;
      display: block;
    }
    .status.loading {
      background-color: #e6f7ff;
      color: #0050b3;
      display: block;
    }
    .status.success {
      background-color: #f6ffed;
      color: #389e0d;
      display: block;
    }
    .preview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border: 1px dashed #d9d9d9;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Runway 视频生成器</h2>
    
    <img id="preview" class="preview" />
    
    <textarea id="prompt" placeholder="输入提示词（可选），比如：让这个画面动起来，自然流畅"></textarea>
    
    <button id="getImageBtn">1. 先选中Figma图片，点这里获取</button>
    <button id="generateBtn" disabled>2. 生成视频（需要1-3分钟）</button>
    
    <div id="status" class="status"></div>
  </div>

  <script>
    // 替换成你的代理服务器地址！
    const PROXY_URL = 'https://runway-figma-proxy-test1.vercel.app/api/runway-proxy';
    const RUNWAY_API_KEY = ''; // 留空，密钥在服务器端
    
    let currentImageUrl = null;
    
    const getImageBtn = document.getElementById('getImageBtn');
    const generateBtn = document.getElementById('generateBtn');
    const promptInput = document.getElementById('prompt');
    const statusDiv = document.getElementById('status');
    const previewImg = document.getElementById('preview');
    
    // 监听来自Figma的消息
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'error') {
        showStatus(msg.message, 'error');
      }
      
      if (msg.type === 'image-ready') {
        currentImageUrl = msg.imageUrl;
        previewImg.src = currentImageUrl;
        previewImg.style.display = 'block';
        generateBtn.disabled = false;
        showStatus('图片获取成功！可以生成视频了', 'success');
      }
    };
    
    // 点击获取图片按钮
    getImageBtn.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'get-selected-image' } }, '*');
    };
    
    // 点击生成视频按钮
    generateBtn.onclick = async () => {
      if (!currentImageUrl) {
        showStatus('请先获取图片！', 'error');
        return;
      }
      
      generateBtn.disabled = true;
      getImageBtn.disabled = true;
      showStatus('正在提交生成请求...', 'loading');
      
      try {
        // 第一步：提交生成任务
        const response = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            imageUrl: currentImageUrl,
            prompt: promptInput.value
          })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || data.message || '提交失败');
        }
        
        const taskId = data.taskId;
        showStatus('视频正在生成中，请耐心等待1-3分钟...', 'loading');
        
        // 第二步：轮询任务状态
        let videoUrl = null;
        let attempts = 0;
        const maxAttempts = 60; // 最多轮询3分钟
        
        while (attempts < maxAttempts) {
          await new Promise(resolve => setTimeout(resolve, 3000));
          attempts++;
          
          const statusResponse = await fetch(`https://api.dev.runwayml.com/v1/tasks/${taskId}`, {
            headers: {
              'Authorization': `Bearer ${process.env.RUNWAY_API_KEY}`,
              'X-Runway-Version': '2024-11-06'
            }
          });
          
          const statusData = await statusResponse.json();
          
          if (statusData.status === 'SUCCEEDED') {
            videoUrl = statusData.output[0];
            break;
          }
          
          if (statusData.status === 'FAILED') {
            throw new Error('视频生成失败：' + (statusData.error?.message || '未知错误'));
          }
        }
        
        if (!videoUrl) {
          throw new Error('生成超时，请稍后再试');
        }
        
        showStatus('视频生成成功！正在打开...', 'success');
        
        // 把视频地址发给Figma
        parent.postMessage({ pluginMessage: { type: 'insert-video', videoUrl } }, '*');
        
        // 同时在新标签页打开视频
        window.open(videoUrl, '_blank');
        
      } catch (error) {
        showStatus('错误：' + error.message, 'error');
        console.error(error);
      } finally {
        generateBtn.disabled = false;
        getImageBtn.disabled = false;
      }
    };
    
    // 显示状态信息
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = 'status ' + type;
    }
  </script>
</body>
</html>
